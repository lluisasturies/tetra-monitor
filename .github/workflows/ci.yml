name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ruff pytest pyyaml fastapi httpx python-jose bcrypt slowapi python-dotenv python-multipart

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v

  release-check:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Verificar que el merge viene de develop
        run: |
          echo "✅ Merge a master superó lint + tests"
