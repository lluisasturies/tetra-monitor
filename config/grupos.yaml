# Catálogo de grupos TETRA, carpetas y listas de escaneo.
# Este fichero se usa SOLO como semilla en el primer arranque.
# Si la tabla 'grupos' ya tiene datos, este fichero se ignora.

grupos:
  - gssi: 36001
    nombre: "Operaciones"
  - gssi: 36002
    nombre: "Emergencias"
  - gssi: 36003
    nombre: "Logística"
  - gssi: 36004
    nombre: "Seguridad"

# Carpetas organizativas — equivalente a las folders de la radio.
# El orden de las carpetas y de los grupos dentro de cada carpeta
# se asigna automáticamente por posición (no hace falta especificarlo).
# Un GSSI puede aparecer en varias carpetas.
carpetas:
  - nombre: "Operativo"
    grupos: [36001, 36003]
  - nombre: "Emergencias"
    grupos: [36002, 36004]

scan_lists:
  - nombre: "ListaScan1"
    grupos: [36001, 36002, 36003]
  - nombre: "Emergencias"
    grupos: [36002, 36004]
