# TETRA Monitor — Nginx reverse proxy con TLS
# Copia este fichero a /etc/nginx/sites-available/tetra-monitor
# y haz: sudo ln -s /etc/nginx/sites-available/tetra-monitor /etc/nginx/sites-enabled/

# Redirigir HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # --- Certificado TLS ---
    ssl_certificate     /etc/ssl/tetra-monitor/cert.pem;
    ssl_certificate_key /etc/ssl/tetra-monitor/key.pem;

    # --- Protocolos y cifrados seguros ---
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # --- Headers de seguridad ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-Frame-Options           DENY                                   always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "no-referrer"                          always;

    # --- Ocultar versión de nginx ---
    server_tokens off;

    # --- Proxy a la API ---
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Limitar tamaño de peticiones (protección contra payloads gigantes)
        client_max_body_size 1M;
    }

    # --- Bloquear acceso a ficheros ocultos ---
    location ~ /\. {
        deny all;
    }
}
